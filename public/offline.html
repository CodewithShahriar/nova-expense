<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0c10" />
    <title>Nova Expense Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0c10;
        color: #f8fafc;
        font-family:
          Inter,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }
      main {
        width: min(88vw, 390px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 28px;
        background: linear-gradient(145deg, rgba(31, 38, 48, 0.9), rgba(17, 21, 28, 0.9));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.45);
      }
      .badge {
        width: 48px;
        height: 48px;
        border-radius: 18px;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #6ee7b7, #22d3ee);
        color: #0a0c10;
        font-weight: 800;
      }
      h1 {
        margin: 20px 0 8px;
        font-size: 28px;
      }
      p {
        margin: 0;
        color: #9ca3af;
        line-height: 1.55;
      }
      a {
        margin-top: 22px;
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        justify-content: center;
        border-radius: 16px;
        padding: 0 18px;
        color: #0a0c10;
        background: linear-gradient(135deg, #6ee7b7, #22d3ee);
        text-decoration: none;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">N</div>
      <h1>You are offline</h1>
      <p>Nova Expense keeps working locally. Reconnect to sync your latest changes.</p>
      <a href="/">Open dashboard</a>
    </main>
  </body>
</html>
